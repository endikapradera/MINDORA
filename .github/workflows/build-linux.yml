name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "ui/**"
      - ".github/workflows/build-linux.yml"

jobs:
  build-linux:
    name: Build MINDORA for Linux (x64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies ───────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            libopenblas-dev \
            wget \
            curl \
            file \
            libdbus-1-dev \
            pkg-config \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      # ── 3. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('core/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies + PyInstaller
        run: |
          cd core
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Embedding model ───────────────────────────────────────────────
      - name: Download embedding model
        run: |
          python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Copy embedding model to assets/
        run: |
          CACHE_BASE="$HOME/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2"
          SNAP_HASH=$(cat "$CACHE_BASE/refs/main")
          SNAP_DIR="$CACHE_BASE/snapshots/$SNAP_HASH"
          DEST_DIR="core/assets/embedding_model"
          mkdir -p "$DEST_DIR"
          cp -r "$SNAP_DIR/." "$DEST_DIR/"
          echo "✅ Embedding model ready at $DEST_DIR"

      # ── 5. Build Python backend ──────────────────────────────────────────
      - name: Build backend with PyInstaller (Linux spec)
        run: |
          cd core
          python -m PyInstaller pyinstaller_linux.spec --clean --noconfirm

      - name: Verify backend build
        run: |
          if [ ! -f "core/dist/IA_Core/IA_Core" ]; then
            echo "❌ PyInstaller failed — IA_Core not found"
            exit 1
          fi
          echo "✅ IA_Core built: $(du -sh core/dist/IA_Core | cut -f1)"

      # ── 6. Node.js setup ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      # ── 7. Rust setup ────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri -> target

      # ── 8. Build Tauri frontend + package ────────────────────────────────
      - name: Install frontend dependencies
        run: |
          cd ui
          npm ci

      - name: Build Tauri app (AppImage + deb)
        run: |
          cd ui
          npm run tauri build -- --bundles appimage,deb
        env:
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"

      # ── 9. Upload artifact ───────────────────────────────────────────────
      - name: Find installer paths
        id: find_installer
        run: |
          APPIMAGE=$(find ui/src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          DEB=$(find ui/src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          echo "appimage=$APPIMAGE" >> $GITHUB_OUTPUT
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "✅ AppImage: $APPIMAGE"
          echo "✅ DEB: $DEB"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MINDORA-Linux-AppImage-${{ github.sha }}
          path: ${{ steps.find_installer.outputs.appimage }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        if: steps.find_installer.outputs.deb != ''
        with:
          name: MINDORA-Linux-DEB-${{ github.sha }}
          path: ${{ steps.find_installer.outputs.deb }}
          retention-days: 30
          if-no-files-found: warn

      # ── 10. Summary ──────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║        ✅ MINDORA Linux build complete!          ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "AppImage: ${{ steps.find_installer.outputs.appimage }}"
          echo ""
          echo "⚠️  Reminder: end-users must place the LLM model at:"
          echo "   ~/.local/share/MINDORA/models/"
          echo "   Model: mistral-7b-instruct-v0.2.Q4_K_M.gguf (~4.1 GB)"
          echo "   https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.2-GGUF"
